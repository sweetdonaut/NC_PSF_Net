n_samples: 1000
psf_size: 256
crop_size: 32

# Sensor sampling: render PSF on (psf_size × pixel_oversample) fine grid,
# then sum oversample² fine cells per sensor pixel with a random sub-pixel
# offset. Models the finite pixel grid integrating a continuous PSF;
# different pool entries get different sub-pixel offsets, giving the model
# the same kind of peak-position randomness real captures have.
# 1 = disabled (original behavior); 2/4/8 = oversample factor.
pixel_oversample: 4

# Annular aperture
outer_r: [60, 60]
epsilon: [0, 0]
ellipticity: [0, 0]
ellip_angle: [0, 0]

# Pupil obstructions (optional — all default to 0 when omitted)
square_eps: [0, 0]
h_stripe_w: [0, 0]
v_stripe_w: [0, 0]
h_outer_crop: [0, 0]
v_outer_crop: [0, 0]

# Richards-Wolf vector mode (high-NA polarization-aware diffraction).
# Required for high-NA optical systems where polarization effects matter.
# Cost: 3x slower than scalar mode (3 FFTs instead of 1).
vector_mode: true
na: [0.95, 0.95]            # numerical aperture; can be a [min, max] range
pol_type: linX              # input polarization. Allowed values:
                            #   linX, linY, lin45  — linear polarization
                            #   circR, circL       — circular polarization
                            #   radial             — radial polarization
                            #   azimuthal          — DO NOT USE YET. Produces a
                            #                        doughnut-shaped PSF that needs
                            #                        further validation before training.

# Aberrations (Zernike)
defocus: [0, 0]
astig_x: [0, 0]
astig_y: [0, 0]
coma_x: [0, 0]
coma_y: [0, 0]
spherical: [0, 0]
trefoil_x: [0, 0]
trefoil_y: [0, 0]

# Defect intensity magnitude (sign is randomly +/-).
# Forms: scalar, [a, b], or [[a1,b1], [a2,b2], ...] (equal-prob mixture)
intensity_abs: [[8, 12]]

# Noise
brightness: [5000, 5000]
background: [5, 5]
poisson_noise: true
gaussian_sigma: [1.5, 1.5]

# Cleaning (connected peak)
threshold_multiplier: 1.0

output_dir: output
